<style>
        .dot-pattern {
            background-image: radial-gradient(var(--tw-colors-outline-variant) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.3;
        }
        @keyframes pulse-op {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-op {
            animation: pulse-op 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes progress-bar {
            0% { width: 0%; }
            100% { width: 61%; }
        }
        .animate-progress {
            animation: progress-bar 1.5s ease-out forwards;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface h-screen w-screen overflow-hidden flex flex-col justify-center items-center relative">
<div class="absolute inset-0 dot-pattern z-0 pointer-events-none"></div>
<div class="z-10 flex flex-col items-center justify-center space-y-margin-md max-w-sm w-full px-margin-sm">
<div class="flex flex-col items-center justify-center space-y-unit">
<!-- STITCH_SVG_START:ANIMATION_13 class="w-24 h-24 mx-auto text-primary" --><div class="w-24 h-24 mx-auto text-primary" id="animated-svg-ANIMATION_13" style="display:block;"><svg fill="none" viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }
    @keyframes pulse-inner {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    .ring-outer { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
    .ring-middle { animation: pulse 2s ease-in-out infinite; transform-origin: center; animation-delay: 0.1s; }
    .ring-inner { animation: pulse 1s ease-in-out infinite; transform-origin: center; animation-delay: 0.2s; }
    .dot { animation: pulse-inner 1.5s ease-in-out infinite; transform-origin: center; }
  </style>
<circle class="ring-outer" cx="50" cy="50" opacity="0.3" r="45" stroke="currentColor" stroke-width="2"></circle>
<circle class="ring-middle" cx="50" cy="50" opacity="0.5" r="35" stroke="currentColor" stroke-width="2"></circle>
<circle class="ring-inner" cx="50" cy="50" opacity="0.8" r="25" stroke="currentColor" stroke-width="2.5"></circle>
<circle class="dot" cx="50" cy="50" fill="currentColor" r="8"></circle>
</svg></div><!-- STITCH_SVG_END:ANIMATION_13 -->
<h1 class="font-display text-display text-primary tracking-tighter">Zenvora</h1>
</div>
<div class="w-full space-y-4">
<div class="flex justify-between items-center font-code text-code text-on-surface-variant w-full">
<span>SYSTEM INITIALIZATION</span>
<span>61%</span>
</div>
<div class="w-full h-1 bg-surface-variant rounded-full overflow-hidden border border-outline-variant">
<div class="h-full bg-primary animate-progress rounded-full"></div>
</div>
<div class="flex flex-col space-y-1 font-code text-code text-on-surface-variant w-full">
<div class="flex justify-between">
<span>DEVICE IDENTIFIER:</span>
<span class="text-on-surface">ZV-8829-X</span>
</div>
<div class="flex justify-between">
<span>APP VERSION:</span>
<span class="text-on-surface">v1.0.4</span>
</div>
<div class="flex justify-between">
<span>NETWORK STATUS:</span>
<span class="text-primary flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span> CONNECTING...</span>
</div>
</div>
</div>
</div>
</body></html>
